name: release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # keep in sync with rust-toolchain.toml — this action's RUSTUP_TOOLCHAIN
      # env overrides the file, so an unpinned channel here is what actually builds
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-15
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          cache-all-crates: "true"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build
        working-directory: web
      - run: pip3 install cargo-lambda
      - run: cargo lambda build --release --arm64 --features embed-web
      # secret/value env vars are passed via `env:` and referenced as quoted
      # shell vars below, so spaces (BUSINESS_NAME) and newlines (REMIT_TO)
      # survive intact. Unset secrets become empty -> the Lambda treats them as
      # absent (admin routes 503, remit-to omitted) rather than breaking.
      - run: >-
          cargo lambda deploy accept-payments --enable-function-url
          --env-var DB_TABLE=accept-payments-posts
          --env-var PAYMENTS_TABLE=accept-payments-payments
          --env-var INVOICES_TABLE=accept-payments-invoices
          --env-var STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY"
          --env-var STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET"
          --env-var ADMIN_TOKEN="$ADMIN_TOKEN"
          --env-var BUSINESS_NAME="$BUSINESS_NAME"
          --env-var REMIT_TO="$REMIT_TO"
        env:
          AWS_DEFAULT_REGION: us-west-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          BUSINESS_NAME: ${{ secrets.BUSINESS_NAME }}
          REMIT_TO: ${{ secrets.REMIT_TO }}

name: release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # keep in sync with rust-toolchain.toml — this action's RUSTUP_TOOLCHAIN
      # env overrides the file, so an unpinned channel here is what actually builds
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-15
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          cache-all-crates: "true"
      - run: pip3 install cargo-lambda
      - run: cargo lambda build --release --arm64
      - run: cargo lambda deploy accept-payments --enable-function-url --env-var DB_BUCKET=accept-payments-db-johncarmack1984
        env:
          AWS_DEFAULT_REGION: us-west-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # single writer: concurrent instances would clobber the shared S3 db file
      - run: aws lambda put-function-concurrency --function-name accept-payments --reserved-concurrent-executions 1
        env:
          AWS_DEFAULT_REGION: us-west-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

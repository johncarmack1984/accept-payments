name: release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

# Least privilege for GITHUB_TOKEN: the job only checks out code to build and
# deploy to AWS (via AWS creds in secrets, not GITHUB_TOKEN) — it never writes
# back to the repo, so read access to contents is all it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # keep in sync with rust-toolchain.toml — this action's RUSTUP_TOOLCHAIN
      # env overrides the file, so an unpinned channel here is what actually builds
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-15
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          cache-all-crates: "true"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build
        working-directory: web
      - run: pip3 install cargo-lambda
      - run: cargo lambda build --release --arm64 --features embed-web
      # OAuth: the client secret + session signing key are secrets passed via
      # `env:` and quoted shell vars; the client id and admin login are
      # non-secret repo variables. Unset values become empty -> the Lambda
      # treats the admin as "not configured" rather than breaking the deploy.
      - run: >-
          cargo lambda deploy accept-payments --enable-function-url
          --env-var DB_TABLE=accept-payments-posts
          --env-var PAYMENTS_TABLE=accept-payments-payments
          --env-var INVOICES_TABLE=accept-payments-invoices
          --env-var STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY"
          --env-var STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET"
          --env-var OAUTH_CLIENT_ID=${{ vars.OAUTH_CLIENT_ID }}
          --env-var OAUTH_CLIENT_SECRET="$OAUTH_CLIENT_SECRET"
          --env-var SESSION_SECRET="$SESSION_SECRET"
          --env-var ADMIN_GITHUB_LOGIN=${{ vars.ADMIN_GITHUB_LOGIN }}
        env:
          AWS_DEFAULT_REGION: us-west-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
